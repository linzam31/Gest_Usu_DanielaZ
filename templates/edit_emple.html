<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Document</title>
</head>

<body>
    <div class="container my-5 text-center ">
        <h2>Editar Empleado</h2>
        <form action="{{ url_for('actualizar_emple', id=emple[0]) }}" method="post">
            <input type="hidden" name="id" value="{{ emple[0]}}">
            <div class="mb-3">
                <label for="usuario" class="form-label">Nombre</label>
                <input type="text" class="form-control " id="txtnombre" name="txtnombres"
                    value="{{ emple[2]}}" required>
            </div>
            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido</label>
                <input type="text" class="form-control " id="apellido" name="txtapellidos"
                    value="{{ emple[3]}}" required>
            </div>
            <div class="mb-3">
                <label for="txtcargo" class="form-label">Cargo</label>
                <input type="text" class="form-control " id="txtcargo" name="txtcargo"
                    value="{{ emple[4]}}" required>
            </div>
            <div class="mb-3">
                <label for="horas" class="form-label">Horas Extras</label>
                <input type="number" class="form-control " id="horas" name="txthoras_ex"
                    value="{{ emple[6]}}" readonly>
            </div>
            <div class="mb-3">
                <label>Departamento</label>
                <select name="txtdepartamento" id="depa" class="form-control">
                    <option value="Recursos humanos">Recursos humanos</option>
                    <option value="Sistemas">Sistemas</option>
                    <option value="Administracion">Administracion</option>
                    <option value="Contabilidad">Contabilidad</option>
                    <option value="Cafeteria">Cafeteria</option>
                    <option value="zona juegos">Zona de Juegos</option>
                    <option value="Red de medios">Red de medios</option>
                </select>

            </div>
            <div class="mb-3">
                <label for="bonificacion" class="form-label">Bonificacion</label>
                <input type="number" class="form-control " id="bonificacion" name="txtbonificacion"
                    value="{{ emple[7]}}" readonly>
            </div>
            <div class="mb-3">
                <label for="salarioB" class="form-label">Salario bruto</label>
                <input type="number" class="form-control " id="salarioB" name="salarioB"
                    value="{{ emple[5]}}" disabled>
            </div>
            <div class="mb-3">
                <label for="salarioN" class="form-label">Salario neto</label>
                <input type="number" class="form-control " id="salarioN" name="salarioN"
                    value="{{ emple[10]}}" disabled>
            </div>
            <button type="submit" class="btn btn-outline-primary me-3">Guardar Cambios</button>
            <a href="{{url_for('inicio_empleado')}}" class="btn btn-danger ">Cancelar</a>
        </form>
    </div>
</body>

</html>

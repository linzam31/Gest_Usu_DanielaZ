<!DOCTYPE html>

<head>
    <title>Principal</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
    <div class="content my-5 text-center">
        <h1 class="text-center m-5">
            Bienvenido {%print session['usuario'] %}
        </h1>
        <a href="{{url_for('salir')}}" class="btn btn-outline-danger">Cerrar Sesión</a>

    </div>

    <table class="table table-secondary container my-5">
        <thead>
            <tr>

                <th>Nombre</th>
                <th>Apellido</th>
                <th>Cargo</th>
                <th>Departamento</th>
                <th>Horas Extra</th>
                <th>Bonificación</th>
                <th>Salario</th>
                <th>Salario Neto</th>
                <th>Opciones</th>
            </tr>
        </thead>
        <tbody>

            <tr>
                <td>{{ emple[0]}}</td>
                <td>{{ emple[1]}}</td>
                <td>{{ emple[2]}}</td>
                <td>{{ emple[3]}}</td>
                <td>{{ emple[4]}}</td>
                <td>{{ emple[5]}}</td>
                <td>{{ emple[6]}}</td>
                <td>{{ emple[7]}}</td>
                
                <td>
                <a href="{{url_for('editar_emple', id=emple[0])}}" class="btn btn-outline-secondary">Editar</a>
                </td>
            </tr>

        </tbody>
    </table>

</body>

</html>

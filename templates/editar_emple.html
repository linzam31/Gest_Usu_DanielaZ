<!DOCTYPE html>
<head>
    <title>Registro de usuarios</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- creamos el Modal -->
    <div class="">
        <div class="">
            <div class="">
                <!--definir el header-->
                <div class="modal-header">
                    <h4 class="">Editar Empleados</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                    <form method="POST"action="{{url_for('actualizar_emple', id=emple[0])}}">
                        <input type="hidden" name="id" value="{{emple[0]}}">

                        
                    
                        <div class="mb-3">
                            <label>Nombre:</label>
                            <input type="text" name="txtnombres" class="form-control" value="{{emple[2]}}">
                        </div>

                        <div class="mb-3">
                            <label>Apellido:</label>
                            <input type="text" name="txtapellidos" class="form-control" value="{{emple[3]}}">
                        </div>

                        <div class="mb-3">
                            <label>Cargo:</label>
                            <input type="text" name="txtcargo" class="form-control" value="{{emple[4]}}" required>
                        </div>

                        <div class="mb-3">
                            <label>Horas Extras:</label>
                            <input type="text" name="txthoras_ex" class="form-control" value="{{emple[6]}}" required>
                        </div>
                                                
                        <div class="mb-3">
                            <label>Bonificación:</label>
                            <input type="text" name="txtbonificacion" class="form-control" value="{{emple[7]}}" required>
                        </div>
                        

                        <div class="mb-3">
                            <label>Departamento</label>
                            <select name="txtdepartamento" id="depa" class="form-control">
                                <option value="Recursos humanos">Recursos humanos</option>
                                <option value="Sistemas">Sistemas</option>
                                <option value="Administracion">Administracion</option>
                                <option value="Contabilidad">Contabilidad</option>
                                <option value="Cafeteria">Cafeteria</option>
                                <option value="zona juegos">Zona de Juegos</option>
                                <option value="Red de medios">Red de medios</option>
                            </select>
                                
                        </div>
                        
                        
                        <a href="{{url_for('inicio')}}" class="btn-danger">Cancelar</a>
                    
                        <button type="submit" class="btn btn-outline-primary" data-bs-dismiss="modal">Actualizar</button>
                    </form>
                </div>
            
            </div>
        </div>
    </div>          
    
</body>
</html>

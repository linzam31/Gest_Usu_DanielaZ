<!DOCTYPE html>
<head>
    <title>Registro de usuarios</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- creamos el Modal -->
    <div class="">
        <div class="">
            <div class="">
                <!--definir el header-->
                <div class="modal-header">
                    <h4 class="">Editar Usuarios</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                    <form method="POST"action="{{url_for('actualizar_usu', id=usu[0])}}">
                        <input type="hidden" name="id" value="{{usu[0]}}">
                    
                        <div class="mb-3">
                    
                            <label>Usuario:</label>
                            <input type="text" name="txtusuario" class="form-control" value="{{usu[1]}}">
                        </div>

                        <div class="mb-3">
                            <label>Contraseña: </label>
                            <input type="password" name="txtpassword" class="form-control" value="{{usu[2]}}">
                        </div>
                        
                        <div class="mb-3">
                            <label>Rol:</label>
                            <input type="text" name="txtusuario" class="form-control" value="{{usu[3]}}" disabled>
                        </div>
                        
                        <div class="mb-3">
                            <label>Documento:</label>
                            <input type="text" name="txtusuario" class="form-control" value="{{usu[4]}}" disabled>
                        </div>

                        
                        <a href="{{url_for('inicio')}}" class="btn-danger">Cancelar</a>
                    
                        <button type="submit" class="btn btn-outline-primary" data-bs-dismiss="modal">Actualizar</button>
                    </form>
                </div>
            
            </div>
        </div>
    </div>          
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='estilo.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Document</title>
</head>

<body>

    <!--creamos el modal-->
    <div class="modal" id="myModal2">
        <div class="modal-dialog">
            <div class="modal-content">
                <!--definir el header-->
                <div class="modal-header ">
                    <h4 class="modal-title">REGISTRO DE EMPLEADOS</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!--crear formulario para empleado -->
                <div class="modal-body">
                    <form method="POST" action="{{ url_for('registrar_empleado') }}">
                        <div class="mb-3 mt-3">
                            <label>Nombre</label>
                            <input type="text" class="form-control" name="nombre"
                                placeholder="ingresar nombre empleado">
                        </div>

                        <div class="mb-3">
                            <label>Apellido</label>
                            <input type="text" class="form-control" placeholder="ingresar apellido" name="apellido">
                        </div>

                        <div class="mb-3">
                            <label>Documento</label>
                            <input type="number" class="form-control" placeholder="ingresar documento empleado" name="documento"
                                name="documento">
                        </div>

                        <div class="mb-3">
                            <label>Cargo</label>
                            <input type="text" class="form-control" placeholder="ingresar cargo empleado"
                                name="cargo">
                        </div>


                        <div class="mb-3">
                            <label>Departamento</label>
                            <select name="departamento" id="depa" class="form-control">
                                <option value="Recursos humanos">Recursos humanos</option>
                                <option value="Sistemas">Sistemas</option>
                                <option value="Administracion">Administracion</option>
                                <option value="Contabilidad">Contabilidad</option>
                                <option value="Cafeteria">Cafeteria</option>
                                <option value="Zonajuegos">Zona de Juegos</option>
                                <option value="Red de medios">Coordinacion</option>
                            </select>
                                
                        </div>

                        

                        <div class="mb-3">
                            <label>Horas Extra</label>
                            <input type="text" class="form-control" placeholder="ingresar el salario del empleado"
                                name="ho_ex">
                        </div>

                        <div class="mb-3">
                            <label>Bonificación</label>
                            <input type="text" class="form-control" placeholder="ingresar el salario del empleado"
                                name="bonificacion">
                        </div>

                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">
                                Registrar
                            </button>
                        </div>
                    </form>
                </div>
                <!--definir el pie de pagina del formulario-->

            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<head>
    <title>Registro de usuarios</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- creamos el Modal -->
    <div class="modal" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <!--definir el header-->
                <div class="modal-header">
                    <h4 class="modal-title">Registro de usuarios</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!--definir el cuerpo modal formulario-->
                <div class="modal-body">
                    <!-- Formulario de registro de usuario -->
                    <form method="POST" action="{{url_for('guardar_usuario')}}"> 
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre:</label>
                            <input type="text" class="form-control" name="txtnombre" placeholder="Ingrese su nombre">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña:</label>
                            <input type="password" class="form-control" name="txtpass" placeholder="Ingrese su contraseña">
                        </div>
                        <div class="mb-3">
                            <label>Rol:</label>
                            <select class="form-control" name="txtrol">
                                <option value="Empleado">Empleado</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Documento:</label>
                            <input type="number" class="form-control" placeholder="Ingrese documento de ususario" name="txtdocumento">
                        </div>
                        <button type="submit" class="btn btn-outline-primary" data-bs-dismiss="modal">Registrar</button>
                    </form>
                </div>

                <!--definir el footer-->
                <div class="modal-footer">
                    
                </div>  
            
            </div>
        </div>
    </div>          
    
</body>
</html>
